<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>微信 Markdown 排版工具</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/lib/codemirror.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/theme/one-dark.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/theme/monokai.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/mode/markdown/markdown.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Markdown to WeChat</p>
        <h1>微信公众号排版渲染工具</h1>
      </div>
      <div class="header-actions">
        <button id="settingsBtn" type="button" class="icon-button" aria-label="设置">⚙️</button>
        <button id="draftBtn" type="button" class="icon-button" aria-label="草稿管理">📝</button>
        <button id="shareBtn" type="button" class="icon-button" aria-label="分享">🔗</button>
        <button id="themeToggleBtn" type="button" class="icon-button" aria-label="深色模式">🌙</button>
        <button id="smartFormatBtn" type="button">✨ 智能排版</button>
        <button id="loadSampleBtn" type="button">示例</button>
        <button id="exportBtn" type="button">导出 HTML</button>
        <button id="copyBtn" type="button" class="primary">复制到公众号</button>
      </div>
    </header>

    <div id="settingsDropdown" class="dropdown" hidden>
      <div class="dropdown-section">
        <label class="field">
          <span>模板分类</span>
          <select id="templateCategorySelect">
            <option value="all">全部模板</option>
            <option value="work">职场办公</option>
            <option value="tech">技术教程</option>
            <option value="life">生活分享</option>
            <option value="travel">旅行攻略</option>
            <option value="food">美食探店</option>
          </select>
        </label>
      </div>
      <div class="dropdown-section">
        <label class="field">
          <span>模板</span>
          <select id="templateSelect">
            <option value="default">默认模板</option>
            <option value="work-report">工作汇报</option>
            <option value="tech-article">技术文章</option>
            <option value="life-diary">生活日记</option>
            <option value="travel-guide">旅行攻略</option>
            <option value="food-review">美食测评</option>
          </select>
        </label>
      </div>
      <div class="dropdown-section">
        <label class="field">
          <span>主题</span>
          <select id="themeSelect"></select>
        </label>
      </div>
      <div class="dropdown-section">
        <label class="field">
          <span>代码主题</span>
          <select id="codeThemeSelect"></select>
        </label>
      </div>
      <div class="dropdown-divider"></div>
      <button id="insertTemplateBtn" type="button" class="dropdown-item">插入模板</button>
      <button id="saveTemplateBtn" type="button" class="dropdown-item">保存为模板</button>
    </div>

    <main class="workspace">
      <section class="editor-pane" aria-label="Markdown 编辑区">
        <div class="pane-title">
          <strong>Markdown</strong>
          <span id="saveState">已自动保存</span>
        </div>
        <div id="markdownEditor"></div>
      </section>

      <section class="preview-pane" aria-label="微信公众号预览区">
        <div class="pane-title">
          <strong>微信预览</strong>
          <span id="copyState">复制时会包含内联样式</span>
        </div>
        <div class="phone-frame">
          <article id="preview" class="wechat-preview"></article>
        </div>
      </section>

      <aside class="inspector" aria-label="兼容性提示">
        <div class="pane-title">
          <strong>创作助手</strong>
        </div>
        <div id="stats" class="stats-grid"></div>
        <div class="side-section">
          <h2>质量检查</h2>
          <div id="warnings" class="warnings"></div>
        </div>
        <div class="side-section">
          <h2>主题速览</h2>
          <div id="themeCards" class="theme-cards"></div>
        </div>
        <div class="side-section">
          <h2>自定义主题</h2>
          <button id="openThemeEditorBtn" type="button" class="wide-button">编辑我的主题</button>
        </div>
        <div class="side-section">
          <h2>图片设置</h2>
          <label class="compact-field">
            <span>图片宽度</span>
            <select id="imageWidthSelect">
              <option value="100%">100%</option>
              <option value="92%">92%</option>
              <option value="80%">80%</option>
            </select>
          </label>
          <label class="compact-field">
            <span>圆角</span>
            <input id="imageRadiusInput" type="range" min="0" max="16" value="6" />
          </label>
          <label class="check-field">
            <input id="imageCaptionToggle" type="checkbox" checked />
            <span>使用 alt 文本生成图注</span>
          </label>
        </div>
        <div class="side-section">
          <h2>预览布局</h2>
          <label class="compact-field">
            <span>缩放</span>
            <select id="previewZoomSelect">
              <option value="0.86">86%</option>
              <option value="1" selected>100%</option>
              <option value="1.12">112%</option>
            </select>
          </label>
          <button id="toggleFocusBtn" type="button" class="wide-button">专注预览</button>
        </div>
      </aside>
    </main>

    <div id="toast" class="toast" hidden></div>

    <!-- 草稿管理模态框 -->
    <div id="draftModal" class="modal-backdrop" hidden>
      <section class="modal" role="dialog" aria-modal="true" style="min-width: 600px;">
        <div class="modal-header">
          <div>
            <p class="eyebrow">草稿管理</p>
            <h2>我的草稿</h2>
          </div>
          <button id="closeDraftBtn" type="button" class="icon-button" aria-label="关闭">×</button>
        </div>
        <div style="padding: 16px;">
          <div style="display: flex; gap: 8px; margin-bottom: 16px;">
            <button id="newDraftBtn" type="button" style="flex: 1;">➕ 新建草稿</button>
            <button id="saveCurrentDraftBtn" type="button" style="flex: 1;">💾 保存当前草稿</button>
          </div>
          <div id="draftList" style="max-height: 400px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px;">
            <!-- 草稿列表动态生成 -->
          </div>
        </div>
      </section>
    </div>

    <div id="preflightModal" class="modal-backdrop" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="preflightTitle">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Preflight</p>
            <h2 id="preflightTitle">复制前预检</h2>
          </div>
          <button id="closePreflightBtn" type="button" class="icon-button" aria-label="关闭">×</button>
        </div>
        <div id="preflightSummary" class="preflight-summary"></div>
        <div id="preflightList" class="preflight-list"></div>
        <div class="modal-actions">
          <button id="cancelPreflightBtn" type="button">取消</button>
          <button id="confirmCopyBtn" type="button" class="primary">继续复制</button>
        </div>
      </section>
    </div>

    <div id="themeEditorModal" class="modal-backdrop" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="themeEditorTitle" style="min-width: 700px;">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Theme Builder</p>
            <h2 id="themeEditorTitle">自定义主题</h2>
          </div>
          <button id="closeThemeEditorBtn" type="button" class="icon-button" aria-label="关闭">×</button>
        </div>
        <div style="padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
          <div>
            <h3 style="margin-bottom: 16px; font-size: 16px;">颜色配置</h3>
            <div class="theme-editor-grid">
              <label class="compact-field">
                <span>主色</span>
                <input id="customAccentInput" type="color" value="#137565" />
              </label>
              <label class="compact-field">
                <span>正文色</span>
                <input id="customTextInput" type="color" value="#1f2429" />
              </label>
              <label class="compact-field">
                <span>背景色</span>
                <input id="customBgInput" type="color" value="#ffffff" />
              </label>
              <label class="compact-field">
                <span>引用色</span>
                <input id="customQuoteInput" type="color" value="#f5faf8" />
              </label>
              <label class="compact-field">
                <span>代码块背景</span>
                <input id="customCodeBgInput" type="color" value="#f8fafc" />
              </label>
              <label class="compact-field">
                <span>边框色</span>
                <input id="customBorderInput" type="color" value="#e4e8ee" />
              </label>
            </div>

            <h3 style="margin: 24px 0 16px; font-size: 16px;">样式配置</h3>
            <div class="theme-editor-grid">
              <label class="compact-field">
                <span>标题样式</span>
                <select id="customHeadingModeSelect">
                  <option value="bar">侧边线</option>
                  <option value="chip">标签</option>
                  <option value="plain">下划线</option>
                  <option value="none">无样式</option>
                </select>
              </label>
              <label class="compact-field">
                <span>正文字号</span>
                <input id="customFontSizeInput" type="range" min="14" max="20" value="16" />
                <span id="fontSizeValue" style="font-size: 12px; color: var(--muted);">16px</span>
              </label>
              <label class="compact-field">
                <span>行高</span>
                <input id="customLineHeightInput" type="range" min="150" max="220" value="180" />
                <span id="lineHeightValue" style="font-size: 12px; color: var(--muted);">1.8</span>
              </label>
              <label class="compact-field">
                <span>内容宽度</span>
                <input id="customWidthInput" type="range" min="360" max="600" value="480" />
                <span id="widthValue" style="font-size: 12px; color: var(--muted);">480px</span>
              </label>
            </div>
          </div>
          <div>
            <h3 style="margin-bottom: 16px; font-size: 16px;">实时预览</h3>
            <div id="themePreview" style="border: 1px solid var(--border); border-radius: 8px; padding: 24px; height: 500px; overflow-y: auto; background: #ffffff;">
              <h1 style="margin: 0 0 16px; color: #1f2429;">标题示例</h1>
              <p style="margin: 0 0 12px; line-height: 1.8; color: #1f2429; font-size: 16px;">这是正文内容示例，支持自定义字体大小和行高设置。</p>
              <blockquote style="margin: 16px 0; padding: 12px 16px; background: #f5faf8; border-left: 4px solid #137565; color: #475569;">这是引用块示例，使用主色作为左侧边框。</blockquote>
              <pre style="margin: 16px 0; padding: 16px; background: #f8fafc; border-radius: 8px; overflow-x: auto;"><code>function hello() {
  console.log('Hello World!')
}</code></pre>
              <ul style="margin: 16px 0; padding-left: 24px;">
                <li style="margin-bottom: 8px; color: #1f2429;">列表项1</li>
                <li style="margin-bottom: 8px; color: #1f2429;">列表项2</li>
              </ul>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button id="resetThemeBtn" type="button">重置</button>
          <button id="exportThemeBtn" type="button">导出主题</button>
          <button id="saveThemeBtn" type="button" class="primary">保存并使用</button>
        </div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/lib/codemirror.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/mode/markdown/markdown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/addon/edit/closebrackets.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/addon/edit/matchbrackets.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@6.0.1/addon/selection/active-line.js"></script>

    <script>
      // 初始化CodeMirror编辑器
      const editor = CodeMirror(document.getElementById('markdownEditor'), {
        value: localStorage.getItem('markdownDraft') || '',
        mode: 'markdown',
        theme: 'one-dark',
        lineNumbers: true,
        lineWrapping: true,
        autoCloseBrackets: true,
        matchBrackets: true,
        styleActiveLine: true,
        indentUnit: 2,
        tabSize: 2,
        indentWithTabs: false
      })

      // 监听编辑器变化
      editor.on('change', () => {
        const content = editor.getValue()
        localStorage.setItem('markdownDraft', content)
        updatePreview(content)
        updateStats(content)
        document.getElementById('saveState').textContent = '已自动保存'
      })

      // 同步滚动功能
      let isSyncing = false
      
      editor.on('scroll', () => {
        if (isSyncing) return
        isSyncing = true
        const editorScrollInfo = editor.getScrollInfo()
        const scrollPercentage = editorScrollInfo.top / (editorScrollInfo.height - editorScrollInfo.clientHeight)
        const previewFrame = document.querySelector('.phone-frame')
        previewFrame.scrollTop = scrollPercentage * (previewFrame.scrollHeight - previewFrame.clientHeight)
        setTimeout(() => isSyncing = false, 100)
      })

      document.querySelector('.phone-frame').addEventListener('scroll', () => {
        if (isSyncing) return
        isSyncing = true
        const previewFrame = document.querySelector('.phone-frame')
        const scrollPercentage = previewFrame.scrollTop / (previewFrame.scrollHeight - previewFrame.clientHeight)
        const editorScrollInfo = editor.getScrollInfo()
        editor.scrollTo(null, scrollPercentage * (editorScrollInfo.height - editorScrollInfo.clientHeight))
        setTimeout(() => isSyncing = false, 100)
      })

      // 全局变量
      let currentContent = ''

      // Toast提示函数
      function showToast(message, type = 'success') {
        const toast = document.getElementById('toast')
        toast.textContent = message
        toast.className = `toast toast-${type}`
        toast.hidden = false
        setTimeout(() => {
          toast.hidden = true
        }, 3000)
      }

      // 设置按钮下拉菜单
      const settingsBtn = document.getElementById('settingsBtn')
      const settingsDropdown = document.getElementById('settingsDropdown')

      settingsBtn.addEventListener('click', (e) => {
        e.stopPropagation()
        settingsDropdown.hidden = !settingsDropdown.hidden
        if (!settingsDropdown.hidden) {
          const rect = settingsBtn.getBoundingClientRect()
          settingsDropdown.style.top = `${rect.bottom + 8}px`
          settingsDropdown.style.right = `${window.innerWidth - rect.right}px`
        }
      })

      document.addEventListener('click', (e) => {
        if (!settingsDropdown.contains(e.target) && e.target !== settingsBtn) {
          settingsDropdown.hidden = true
        }
      })

      // 复制按钮
      document.getElementById('copyBtn').addEventListener('click', async () => {
        try {
          const preview = document.getElementById('preview')
          await navigator.clipboard.writeText(preview.outerHTML)
          showToast('✅ 已成功复制到剪贴板，可直接粘贴到公众号编辑器')
        } catch (err) {
          showToast('❌ 复制失败，请手动复制', 'error')
        }
      })

      // 示例按钮
      document.getElementById('loadSampleBtn').addEventListener('click', () => {
        const sample = `# 微信公众号排版示例

这是一个**Markdown**排版工具，可以帮助你快速将Markdown内容转换为微信公众号兼容的格式。

## 主要功能

- 🎨 多种主题模板
- 🔍 实时预览
- 📝 语法高亮
- 📱 响应式设计

### 代码示例

\`\`\`javascript
function hello() {
  console.log('Hello, WeChat!')
}
\`\`\`

### 图片示例

![示例图片](https://picsum.photos/800/400)

> 这是一个引用块，用来强调重要内容。

- 列表项1
- 列表项2
- 列表项3

1. 有序列表1
2. 有序列表2
3. 有序列表3

**加粗文字** | *斜体文字* | [链接文字](https://github.com)
--- | --- | ---
单元格1 | 单元格2 | 单元格3
单元格4 | 单元格5 | 单元格6
`
        editor.setValue(sample)
        showToast('✅ 已加载示例内容')
      })

      // 智能排版功能
      document.getElementById('smartFormatBtn').addEventListener('click', () => {
        let content = editor.getValue()
        let changes = 0

        // 1. 中英文之间自动加空格
        const beforeLength = content.length
        content = content.replace(/([\u4e00-\u9fa5])([a-zA-Z0-9])/g, '$1 $2')
        content = content.replace(/([a-zA-Z0-9])([\u4e00-\u9fa5])/g, '$1 $2')
        changes += (beforeLength - content.length) / 2

        // 2. 中文与数字之间加空格
        content = content.replace(/([\u4e00-\u9fa5])([0-9])/g, '$1 $2')
        content = content.replace(/([0-9])([\u4e00-\u9fa5])/g, '$1 $2')

        // 3. 中文与标点符号优化
        content = content.replace(/([\u4e00-\u9fa5])([，。！？；：])/g, '$1$2')
        content = content.replace(/([，。！？；：])([\u4e00-\u9fa5])/g, '$1 $2')

        // 4. 特殊符号替换
        content = content.replace(/--/g, '——')
        content = content.replace(/\.\.\./g, '…')

        // 5. 去除多余空行（最多保留一个空行）
        content = content.replace(/\n\s*\n\s*\n/g, '\n\n')

        // 6. 标题层级优化（确保#后面有空格）
        content = content.replace(/^(#{1,6})([^\s#])/gm, '$1 $2')

        // 7. 列表优化（-/*后面有空格）
        content = content.replace(/^([-*+])([^\s])/gm, '$1 $2')
        content = content.replace(/^(\d+\.)([^\s])/gm, '$1 $2')

        editor.setValue(content)
        showToast(`✅ 智能排版完成，共优化${changes || '若干'}处格式`) 
      })

      // 模板库功能
      const templates = {
        default: '# 标题\n\n## 副标题\n\n正文内容...',
        'work-report': '# 工作汇报\n\n## 本周完成工作\n- [x] 任务1\n- [x] 任务2\n\n## 下周计划\n- [ ] 计划1\n- [ ] 计划2\n\n## 需要协调的问题\n> 问题描述...',
        'tech-article': '# 技术教程\n\n## 背景介绍\n\n## 实现步骤\n\`\`\`代码块\`\`\`\n\n## 总结',
        'life-diary': '# 生活日记\n\n## 今日心情：😊\n\n## 今日事件\n\n## 今日收获',
        'travel-guide': '# 旅行攻略\n\n## 📍 目的地\n\n## ✅ 准备清单\n\n## 🗺️ 行程安排\n\n## 🍜 美食推荐',
        'food-review': '# 美食测评\n\n## 🏠 店铺信息\n- 名称：\n- 地址：\n- 人均：\n\n## 🍽️ 菜品评价\n\n## ⭐️ 综合评分'
      }

      const templateCategories = {
        all: ['default', 'work-report', 'tech-article', 'life-diary', 'travel-guide', 'food-review'],
        work: ['work-report'],
        tech: ['tech-article'],
        life: ['life-diary'],
        travel: ['travel-guide'],
        food: ['food-review']
      }

      const templateNames = {
        default: '默认模板',
        'work-report': '工作汇报',
        'tech-article': '技术文章',
        'life-diary': '生活日记',
        'travel-guide': '旅行攻略',
        'food-review': '美食测评'
      }

      // 模板分类切换
      document.getElementById('templateCategorySelect').addEventListener('change', (e) => {
        const category = e.target.value
        const templateSelect = document.getElementById('templateSelect')
        templateSelect.innerHTML = ''
        
        templateCategories[category].forEach(templateId => {
          const option = document.createElement('option')
          option.value = templateId
          option.textContent = templateNames[templateId]
          templateSelect.appendChild(option)
        })
      })

      // 插入模板
      document.getElementById('insertTemplateBtn').addEventListener('click', () => {
        const selectedTemplate = document.getElementById('templateSelect').value
        const templateContent = templates[selectedTemplate]
        editor.setValue(templateContent)
        settingsDropdown.hidden = true
        showToast(`✅ 已插入${templateNames[selectedTemplate]}`)
      })

      // 保存为模板
      document.getElementById('saveTemplateBtn').addEventListener('click', () => {
        const currentContent = editor.getValue()
        const templateName = prompt('请输入模板名称：')
        if (templateName) {
          const templateId = 'custom-' + Date.now()
          templates[templateId] = currentContent
          templateNames[templateId] = templateName
          templateCategories.all.push(templateId)
          
          // 更新下拉选项
          const templateSelect = document.getElementById('templateSelect')
          const option = document.createElement('option')
          option.value = templateId
          option.textContent = templateName
          templateSelect.appendChild(option)
          
          // 保存到localStorage
          const savedTemplates = JSON.parse(localStorage.getItem('customTemplates') || '{}')
          savedTemplates[templateId] = { name: templateName, content: currentContent }
          localStorage.setItem('customTemplates', JSON.stringify(savedTemplates))
          
          showToast('✅ 模板已保存')
        }
        settingsDropdown.hidden = true
      })

      // 加载自定义模板
      function loadCustomTemplates() {
        const savedTemplates = JSON.parse(localStorage.getItem('customTemplates') || '{}')
        Object.entries(savedTemplates).forEach(([templateId, data]) => {
          templates[templateId] = data.content
          templateNames[templateId] = data.name
          templateCategories.all.push(templateId)
          
          const option = document.createElement('option')
          option.value = templateId
          option.textContent = data.name
          document.getElementById('templateSelect').appendChild(option)
        })
      }

      // 初始化加载自定义模板
      loadCustomTemplates()

      // 全局快捷键支持
      document.addEventListener('keydown', (e) => {
        // Ctrl/Cmd + S：保存
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          e.preventDefault()
          localStorage.setItem('markdownDraft', editor.getValue())
          showToast('✅ 已手动保存')
        }
        
        // Ctrl/Cmd + Shift + C：复制到公众号
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'C') {
          e.preventDefault()
          document.getElementById('copyBtn').click()
        }
        
        // Ctrl/Cmd + E：导出
        if ((e.ctrlKey || e.metaKey) && e.key === 'e') {
          e.preventDefault()
          document.getElementById('exportBtn').click()
        }
        
        // Ctrl/Cmd + B：加粗
        if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
          e.preventDefault()
          const selection = editor.getSelection()
          editor.replaceSelection(`**${selection || '加粗文字'}**`)
        }
        
        // Ctrl/Cmd + I：斜体
        if ((e.ctrlKey || e.metaKey) && e.key === 'i') {
          e.preventDefault()
          const selection = editor.getSelection()
          editor.replaceSelection(`*${selection || '斜体文字'}*`)
        }
        
        // Ctrl/Cmd + K：插入链接
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
          e.preventDefault()
          const selection = editor.getSelection()
          const url = prompt('请输入链接地址：', 'https://')
          if (url) {
            editor.replaceSelection(`[${selection || '链接文字'}](${url})`)
          }
        }
        
        // Ctrl/Cmd + Shift + M：插入图片
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'M') {
          e.preventDefault()
          const url = prompt('请输入图片地址：', 'https://')
          if (url) {
            const alt = prompt('请输入图片描述：', '图片描述')
            editor.replaceSelection(`![${alt}](${url})`)
          }
        }
        
        // Ctrl/Cmd + /：快捷键帮助
        if ((e.ctrlKey || e.metaKey) && e.key === '/') {
          e.preventDefault()
          showShortcutHelp()
        }
      })

      // 快捷键帮助面板
      function showShortcutHelp() {
        const help = `
📋 快捷键说明：

✍️ 编辑类：
Ctrl/Cmd + B          加粗文字
Ctrl/Cmd + I          斜体文字
Ctrl/Cmd + K          插入链接
Ctrl/Cmd + Shift + M  插入图片

📤 操作类：
Ctrl/Cmd + S          手动保存
Ctrl/Cmd + Shift + C  复制到公众号
Ctrl/Cmd + E          导出Markdown
Ctrl/Cmd + /          显示快捷键帮助
        `
        alert(help)
      }

      // 草稿管理功能
      const draftBtn = document.getElementById('draftBtn')
      const draftModal = document.getElementById('draftModal')
      const closeDraftBtn = document.getElementById('closeDraftBtn')

      draftBtn.addEventListener('click', () => {
        draftModal.hidden = false
        renderDraftList()
      })

      closeDraftBtn.addEventListener('click', () => {
        draftModal.hidden = true
      })

      // 点击背景关闭模态框
      draftModal.addEventListener('click', (e) => {
        if (e.target === draftModal) {
          draftModal.hidden = true
        }
      })

      // 获取所有草稿
      function getDrafts() {
        return JSON.parse(localStorage.getItem('drafts') || '[]')
      }

      // 保存草稿
      function saveDraft(name, content) {
        const drafts = getDrafts()
        const newDraft = {
          id: Date.now(),
          name: name,
          content: content,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        }
        drafts.unshift(newDraft)
        localStorage.setItem('drafts', JSON.stringify(drafts))
        return newDraft
      }

      // 删除草稿
      function deleteDraft(id) {
        let drafts = getDrafts()
        drafts = drafts.filter(draft => draft.id !== id)
        localStorage.setItem('drafts', JSON.stringify(drafts))
      }

      // 渲染草稿列表
      function renderDraftList() {
        const draftList = document.getElementById('draftList')
        const drafts = getDrafts()
        
        if (drafts.length === 0) {
          draftList.innerHTML = `
            <div style="padding: 32px; text-align: center; color: var(--muted);">
              <p>暂无草稿</p>
              <p style="font-size: 14px; margin-top: 8px;">点击"保存当前草稿"创建第一个草稿</p>
            </div>
          `
          return
        }

        draftList.innerHTML = drafts.map(draft => `
          <div style="padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer;" class="draft-item" data-id="${draft.id}" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background='transparent'">
            <div style="flex: 1;">
              <div style="font-weight: 600; margin-bottom: 4px;">${draft.name}</div>
              <div style="font-size: 12px; color: var(--muted);">
                更新于：${new Date(draft.updatedAt).toLocaleString('zh-CN')}
              </div>
            </div>
            <div style="display: flex; gap: 8px;">
              <button type="button" class="load-draft-btn" data-id="${draft.id}" style="font-size: 12px; padding: 4px 8px; min-height: auto;">加载</button>
              <button type="button" class="delete-draft-btn" data-id="${draft.id}" style="font-size: 12px; padding: 4px 8px; min-height: auto; color: #e53e3e; border-color: #e53e3e;">删除</button>
            </div>
          </div>
        `).join('')

        // 绑定事件
        document.querySelectorAll('.load-draft-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation()
            const draftId = parseInt(btn.dataset.id)
            const draft = getDrafts().find(d => d.id === draftId)
            if (draft) {
              editor.setValue(draft.content)
              draftModal.hidden = true
              showToast(`✅ 已加载草稿：${draft.name}`)
            }
          })
        })

        document.querySelectorAll('.delete-draft-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation()
            const draftId = parseInt(btn.dataset.id)
            const draft = getDrafts().find(d => d.id === draftId)
            if (confirm(`确定要删除草稿「${draft.name}」吗？`)) {
              deleteDraft(draftId)
              renderDraftList()
              showToast('✅ 草稿已删除')
            }
          })
        })
      }

      // 新建草稿
      document.getElementById('newDraftBtn').addEventListener('click', () => {
        const draftName = prompt('请输入草稿名称：', `新草稿 ${new Date().toLocaleString('zh-CN')}`)
        if (draftName) {
          saveDraft(draftName, '# 新文档\n\n开始编写内容...')
          editor.setValue('# 新文档\n\n开始编写内容...')
          renderDraftList()
          showToast('✅ 新建草稿成功')
        }
      })

      // 保存当前草稿
      document.getElementById('saveCurrentDraftBtn').addEventListener('click', () => {
        const draftName = prompt('请输入草稿名称：', `草稿 ${new Date().toLocaleString('zh-CN')}`)
        if (draftName) {
          saveDraft(draftName, editor.getValue())
          renderDraftList()
          showToast('✅ 草稿已保存')
        }
      })

      // 分享功能
      document.getElementById('shareBtn').addEventListener('click', () => {
        const content = editor.getValue()
        const shareData = {
          content: content,
          title: '分享的Markdown文档',
          createdAt: new Date().toISOString()
        }
        
        // 生成分享码（简单实现，实际项目可以上传到服务器）
        const shareCode = btoa(JSON.stringify(shareData))
        const shareUrl = `${window.location.origin}${window.location.pathname}#share=${shareCode}`
        
        // 复制分享链接
        navigator.clipboard.writeText(shareUrl).then(() => {
          showToast('✅ 分享链接已复制到剪贴板')
        }).catch(() => {
          prompt('分享链接已生成，请复制：', shareUrl)
        })
      })

      // 加载分享内容
      if (window.location.hash.startsWith('#share=')) {
        try {
          const shareCode = window.location.hash.slice(7)
          const shareData = JSON.parse(atob(shareCode))
          editor.setValue(shareData.content)
          showToast('📥 已加载分享的文档')
          // 清除hash，避免刷新重复加载
          history.replaceState(null, null, window.location.pathname)
        } catch (e) {
          showToast('❌ 分享链接无效', 'error')
        }
      }

      // 主题编辑器实时预览
      const themeInputs = [
        'customAccentInput', 'customTextInput', 'customBgInput', 
        'customQuoteInput', 'customCodeBgInput', 'customBorderInput',
        'customHeadingModeSelect', 'customFontSizeInput', 
        'customLineHeightInput', 'customWidthInput'
      ]

      // 显示数值
      document.getElementById('customFontSizeInput').addEventListener('input', (e) => {
        document.getElementById('fontSizeValue').textContent = `${e.target.value}px`
        updateThemePreview()
      })

      document.getElementById('customLineHeightInput').addEventListener('input', (e) => {
        document.getElementById('lineHeightValue').textContent = `${(e.target.value / 100).toFixed(1)}`
        updateThemePreview()
      })

      document.getElementById('customWidthInput').addEventListener('input', (e) => {
        document.getElementById('widthValue').textContent = `${e.target.value}px`
        updateThemePreview()
      })

      // 所有输入变化时更新预览
      themeInputs.forEach(id => {
        const el = document.getElementById(id)
        if (el) {
          el.addEventListener('input', updateThemePreview)
          el.addEventListener('change', updateThemePreview)
        }
      })

      // 更新主题预览
      function updateThemePreview() {
        const preview = document.getElementById('themePreview')
        const accent = document.getElementById('customAccentInput').value
        const textColor = document.getElementById('customTextInput').value
        const bgColor = document.getElementById('customBgInput').value
        const quoteBg = document.getElementById('customQuoteInput').value
        const codeBg = document.getElementById('customCodeBgInput').value
        const borderColor = document.getElementById('customBorderInput').value
        const headingMode = document.getElementById('customHeadingModeSelect').value
        const fontSize = document.getElementById('customFontSizeInput').value
        const lineHeight = document.getElementById('customLineHeightInput').value / 100
        const width = document.getElementById('customWidthInput').value

        preview.style.background = bgColor
        preview.style.maxWidth = `${width}px`
        preview.style.margin = '0 auto'

        // 更新标题样式
        const h1 = preview.querySelector('h1')
        h1.style.color = textColor
        h1.style.margin = '0 0 16px'
        
        if (headingMode === 'bar') {
          h1.style.paddingLeft = '12px'
          h1.style.borderLeft = `4px solid ${accent}`
          h1.style.background = 'transparent'
          h1.style.textDecoration = 'none'
        } else if (headingMode === 'chip') {
          h1.style.display = 'inline-block'
          h1.style.padding = '4px 12px'
          h1.style.background = accent
          h1.style.color = '#ffffff'
          h1.style.borderRadius = '4px'
          h1.style.borderLeft = 'none'
          h1.style.textDecoration = 'none'
        } else if (headingMode === 'plain') {
          h1.style.paddingBottom = '8px'
          h1.style.borderBottom = `2px solid ${accent}`
          h1.style.borderLeft = 'none'
          h1.style.background = 'transparent'
          h1.style.textDecoration = 'none'
        } else {
          h1.style.borderLeft = 'none'
          h1.style.borderBottom = 'none'
          h1.style.background = 'transparent'
          h1.style.paddingLeft = '0'
        }

        // 更新正文
        const paragraphs = preview.querySelectorAll('p')
        paragraphs.forEach(p => {
          p.style.color = textColor
          p.style.fontSize = `${fontSize}px`
          p.style.lineHeight = lineHeight
        })

        // 更新引用块
        const blockquote = preview.querySelector('blockquote')
        blockquote.style.background = quoteBg
        blockquote.style.borderLeftColor = accent
        blockquote.style.color = textColor
        blockquote.style.opacity = '0.8'

        // 更新代码块
        const pre = preview.querySelector('pre')
        pre.style.background = codeBg
        pre.style.borderColor = borderColor

        // 更新列表
        const lis = preview.querySelectorAll('li')
        lis.forEach(li => {
          li.style.color = textColor
          li.style.fontSize = `${fontSize}px`
        })
      }

      // 导出主题
      document.getElementById('exportThemeBtn').addEventListener('click', () => {
        const themeConfig = {
          accent: document.getElementById('customAccentInput').value,
          textColor: document.getElementById('customTextInput').value,
          bgColor: document.getElementById('customBgInput').value,
          quoteBg: document.getElementById('customQuoteInput').value,
          codeBg: document.getElementById('customCodeBgInput').value,
          borderColor: document.getElementById('customBorderInput').value,
          headingMode: document.getElementById('customHeadingModeSelect').value,
          fontSize: parseInt(document.getElementById('customFontSizeInput').value),
          lineHeight: parseInt(document.getElementById('customLineHeightInput').value) / 100,
          width: parseInt(document.getElementById('customWidthInput').value)
        }
        
        const blob = new Blob([JSON.stringify(themeConfig, null, 2)], { type: 'application/json' })
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        a.download = 'my-theme.json'
        a.click()
        URL.revokeObjectURL(url)
        showToast('✅ 主题已导出')
      })

      // 保存主题
      document.getElementById('saveThemeBtn').addEventListener('click', () => {
        const themeConfig = {
          accent: document.getElementById('customAccentInput').value,
          textColor: document.getElementById('customTextInput').value,
          bgColor: document.getElementById('customBgInput').value,
          quoteBg: document.getElementById('customQuoteInput').value,
          codeBg: document.getElementById('customCodeBgInput').value,
          borderColor: document.getElementById('customBorderInput').value,
          headingMode: document.getElementById('customHeadingModeSelect').value,
          fontSize: parseInt(document.getElementById('customFontSizeInput').value),
          lineHeight: parseInt(document.getElementById('customLineHeightInput').value) / 100,
          width: parseInt(document.getElementById('customWidthInput').value)
        }
        
        localStorage.setItem('customTheme', JSON.stringify(themeConfig))
        showToast('✅ 主题已保存并应用')
        // 这里可以添加应用主题到预览区的逻辑
        document.getElementById('themeEditorModal').hidden = true
      })

      // 重置主题
      document.getElementById('resetThemeBtn').addEventListener('click', () => {
        document.getElementById('customAccentInput').value = '#137565'
        document.getElementById('customTextInput').value = '#1f2429'
        document.getElementById('customBgInput').value = '#ffffff'
        document.getElementById('customQuoteInput').value = '#f5faf8'
        document.getElementById('customCodeBgInput').value = '#f8fafc'
        document.getElementById('customBorderInput').value = '#e4e8ee'
        document.getElementById('customHeadingModeSelect').value = 'bar'
        document.getElementById('customFontSizeInput').value = '16'
        document.getElementById('customLineHeightInput').value = '180'
        document.getElementById('customWidthInput').value = '480'
        document.getElementById('fontSizeValue').textContent = '16px'
        document.getElementById('lineHeightValue').textContent = '1.8'
        document.getElementById('widthValue').textContent = '480px'
        updateThemePreview()
      })

      // 打开主题编辑器时初始化预览
      document.getElementById('openThemeEditorBtn').addEventListener('click', () => {
        updateThemePreview()
      })

      // 导出按钮
      document.getElementById('exportBtn').addEventListener('click', () => {
        const content = editor.getValue()
        const blob = new Blob([content], { type: 'text/markdown' })
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        a.download = 'article.md'
        a.click()
        URL.revokeObjectURL(url)
        showToast('✅ 已导出Markdown文件')
      })

      // 模拟更新预览（实际项目中替换为真实的渲染逻辑）
      function updatePreview(content) {
        currentContent = content
        const preview = document.getElementById('preview')
        // 这里使用简单的Markdown渲染，实际项目中使用完整的渲染器
        preview.innerHTML = content
          .replace(/^# (.*$)/gm, '<h1>$1</h1>')
          .replace(/^## (.*$)/gm, '<h2>$1</h2>')
          .replace(/^### (.*$)/gm, '<h3>$1</h3>')
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.*?)\*/g, '<em>$1</em>')
          .replace(/\n/g, '<br>')
      }

      // 更新统计信息
      function updateStats(content) {
        const chars = content.length
        const words = content.trim().split(/\s+/).length
        const readingTime = Math.ceil(chars / 300)
        const paragraphs = content.split(/\n\s*\n/).length

        const stats = document.getElementById('stats')
        stats.innerHTML = `
          <div class="stat-card">
            <strong>${chars}</strong>
            <span>字符数</span>
          </div>
          <div class="stat-card">
            <strong>${readingTime}</strong>
            <span>阅读时长(分钟)</span>
          </div>
          <div class="stat-card">
            <strong>${paragraphs}</strong>
            <span>段落数</span>
          </div>
          <div class="stat-card">
            <strong>${(content.match(/!\[.*?\]\(.*?\)/g) || []).length}</strong>
            <span>图片数</span>
          </div>
        `
      }

      // 深色模式切换
      let isDarkMode = false
      document.getElementById('themeToggleBtn').addEventListener('click', () => {
        isDarkMode = !isDarkMode
        const body = document.body
        const preview = document.getElementById('preview')
        const phoneFrame = document.querySelector('.phone-frame')
        
        if (isDarkMode) {
          body.classList.add('dark-mode')
          preview.classList.add('dark-preview')
          phoneFrame.classList.add('dark-frame')
          editor.setOption('theme', 'monokai')
          document.getElementById('themeToggleBtn').textContent = '☀️'
          showToast('🌙 已切换到深色模式')
        } else {
          body.classList.remove('dark-mode')
          preview.classList.remove('dark-preview')
          phoneFrame.classList.remove('dark-frame')
          editor.setOption('theme', 'one-dark')
          document.getElementById('themeToggleBtn').textContent = '🌙'
          showToast('☀️ 已切换到浅色模式')
        }
      })

      // 初始化
      updatePreview(editor.getValue())
      updateStats(editor.getValue())
    </script>
  </body>
</html>
